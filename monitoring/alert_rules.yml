groups:
  - name: krab_availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Krab service {{ $labels.job }} is down"
          description: "{{ $labels.job }} ({{ $labels.instance }}) has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          rate(krab_http_responses_total{class="5xx"}[5m]) /
          (rate(krab_requests_total[5m]) + 0.001) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "More than 5% of requests are returning 5xx on {{ $labels.job }}."

      - alert: AvailabilityBurnRateFast
        expr: |
          rate(krab_http_responses_total{class="5xx"}[5m]) /
          (rate(krab_requests_total[5m]) + 0.001) > 0.014
        for: 5m
        labels:
          severity: critical
          slo: availability
          burn_rate: fast
        annotations:
          summary: "Availability error budget burn (fast) on {{ $labels.job }}"
          description: "5xx ratio exceeded 1.4% (14x burn for 99.9% SLO) over 5m on {{ $labels.job }}."
          runbook: "plans/oncall_playbook.md#p1-availability-burn-rate"

      - alert: AvailabilityBurnRateSlow
        expr: |
          rate(krab_http_responses_total{class="5xx"}[30m]) /
          (rate(krab_requests_total[30m]) + 0.001) > 0.006
        for: 15m
        labels:
          severity: warning
          slo: availability
          burn_rate: slow
        annotations:
          summary: "Availability error budget burn (slow) on {{ $labels.job }}"
          description: "5xx ratio exceeded 0.6% (6x burn for 99.9% SLO) over 30m on {{ $labels.job }}."
          runbook: "plans/oncall_playbook.md#p2-availability-burn-rate-slow"

      - alert: ServiceNotReady
        expr: krab_dependency_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Critical dependency {{ $labels.dependency }} is down for {{ $labels.job }}"
          description: "The readiness check for critical dependency {{ $labels.dependency }} is failing on {{ $labels.job }}."

  - name: krab_latency
    rules:
      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(krab_http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency above 2 s on {{ $labels.job }}"
          description: "P99 request latency is {{ $value }}ms on {{ $labels.job }}, exceeding the 2000ms threshold."

      - alert: HighInflightRequests
        expr: krab_inflight_requests > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High in-flight requests on {{ $labels.job }}"
          description: "{{ $labels.job }} has {{ $value }} in-flight requests (threshold: 500)."

      - alert: LatencyBurnRateFast
        expr: |
          (
            rate(krab_http_request_duration_seconds_count[5m]) -
            rate(krab_http_request_duration_seconds_bucket{le="0.5"}[5m])
          ) /
          (rate(krab_http_request_duration_seconds_count[5m]) + 0.001) > 0.10
        for: 5m
        labels:
          severity: warning
          slo: latency
          burn_rate: fast
        annotations:
          summary: "Latency error budget burn (fast) on {{ $labels.job }}"
          description: "More than 10% of requests exceeded 500ms over 5m on {{ $labels.job }}."
          runbook: "plans/oncall_playbook.md#p2-latency-burn-rate"

      - alert: LatencyBurnRateSlow
        expr: |
          (
            rate(krab_http_request_duration_seconds_count[30m]) -
            rate(krab_http_request_duration_seconds_bucket{le="0.5"}[30m])
          ) /
          (rate(krab_http_request_duration_seconds_count[30m]) + 0.001) > 0.05
        for: 15m
        labels:
          severity: warning
          slo: latency
          burn_rate: slow
        annotations:
          summary: "Latency error budget burn (slow) on {{ $labels.job }}"
          description: "More than 5% of requests exceeded 500ms over 30m on {{ $labels.job }}."
          runbook: "plans/oncall_playbook.md#p2-latency-burn-rate"

  - name: krab_rate_limiting
    rules:
      - alert: AuthFailureBurst
        expr: rate(krab_auth_failures_total[1m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High auth failure rate on {{ $labels.job }}"
          description: "More than 10 auth failures per second over the last minute on {{ $labels.job }}. Possible credential stuffing attack."

      - alert: AuthBudgetBurnFast
        expr: rate(krab_auth_failures_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          slo: auth
          burn_rate: fast
        annotations:
          summary: "Auth failure budget burn (fast) on {{ $labels.job }}"
          description: "Auth failure rate remained above 10/s for 5m on {{ $labels.job }}."
          runbook: "plans/oncall_playbook.md#p2-auth-budget-burn"

      - alert: AuthBudgetBurnSlow
        expr: rate(krab_auth_failures_total[30m]) > 5
        for: 15m
        labels:
          severity: warning
          slo: auth
          burn_rate: slow
        annotations:
          summary: "Auth failure budget burn (slow) on {{ $labels.job }}"
          description: "Auth failure rate remained above 5/s for 30m on {{ $labels.job }}."
          runbook: "plans/oncall_playbook.md#p2-auth-budget-burn"

  - name: krab_protocol_parity
    rules:
      - alert: ProtocolErrorRateSkew
        expr: |
          (
            max by (job) (
              sum by (job, protocol) (rate(krab_http_responses_by_protocol_total{class="5xx"}[5m]))
              /
              (sum by (job, protocol) (rate(krab_http_requests_by_protocol_total[5m])) + 0.001)
            )
            /
            1
          )
          -
          (
            min by (job) (
              sum by (job, protocol) (rate(krab_http_responses_by_protocol_total{class="5xx"}[5m]))
              /
              (sum by (job, protocol) (rate(krab_http_requests_by_protocol_total[5m])) + 0.001)
            )
            /
            1
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Protocol error-rate skew detected on {{ $labels.job }}"
          description: "Difference between best/worst protocol error ratio exceeded 5% over 5m."

      - alert: SplitServiceNoTraffic
        expr: rate(krab_http_requests_by_protocol_total{job=~"users-rest|users-graphql|users-rpc"}[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No protocol traffic on {{ $labels.job }}"
          description: "Split protocol service has no observed traffic for 10 minutes."
