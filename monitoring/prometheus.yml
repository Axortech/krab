global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "krab_auth"
    static_configs:
      - targets: ["service_auth:3001"]
    metrics_path: /metrics/prometheus

  - job_name: "krab_users"
    static_configs:
      - targets: ["service_users:3002"]
    metrics_path: /metrics/prometheus

  - job_name: "krab_frontend"
    static_configs:
      - targets: ["service_frontend:3000"]
    metrics_path: /metrics/prometheus
