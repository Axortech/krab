[services.auth]
command = "cargo"
args = ["run", "--bin", "service_auth"]
env = { RUST_LOG = "info" }
healthcheck_url = "http://127.0.0.1:3001/health"
healthcheck_timeout_ms = 1500

[services.auth.restart_policy]
on_exit = true
backoff_ms = 700
max_attempts = 8

[services.auth.healthcheck]
url = "http://127.0.0.1:3001/ready"
timeout_ms = 1500
retries = 12
interval_ms = 300

[services.users]
command = "cargo"
args = ["run", "--bin", "service_users"]
env = { RUST_LOG = "info" }
depends_on = ["auth"]
startup_dependencies = ["auth"]
healthcheck_url = "http://127.0.0.1:3002/health"
healthcheck_timeout_ms = 1500

[services.users.restart_policy]
on_exit = true
backoff_ms = 700
max_attempts = 8

[services.users.healthcheck]
url = "http://127.0.0.1:3002/ready"
timeout_ms = 1500
retries = 12
interval_ms = 300

[services.frontend]
command = "cargo"
args = ["run", "--bin", "service_frontend"]
env = { RUST_LOG = "info" }
depends_on = ["auth", "users"]
startup_dependencies = ["auth", "users"]
healthcheck_url = "http://127.0.0.1:3000/health"
healthcheck_timeout_ms = 1500

[services.frontend.restart_policy]
on_exit = true
backoff_ms = 700
max_attempts = 8

[services.frontend.healthcheck]
url = "http://127.0.0.1:3000/ready"
timeout_ms = 1500
retries = 12
interval_ms = 300
