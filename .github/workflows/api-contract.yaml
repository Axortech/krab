name: API Contract Compatibility

on:
  pull_request:
    paths:
      - 'service_users/**'
      - 'service_auth/**'
      - 'krab_core/src/http.rs'
  push:
    branches:
      - main

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build krab CLI
        run: cargo build --package krab_cli

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run API contract checks (stable CLI interface)
        run: cargo run --package krab_cli -- contract check --diagnostics
