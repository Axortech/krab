name: API Contract Compatibility

on:
  pull_request:
    paths:
      - 'services/service_users/**'
      - 'services/service_auth/**'
      - 'services/service_frontend/**'
      - 'crates/tooling/krab_cli/**'
      - 'crates/framework/krab_core/src/http.rs'
      - 'plans/protocol_flexibility/**'
      - 'monitoring/**'
      - '.env.example'
  push:
    branches:
      - main

jobs:
  contract-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build krab CLI
        run: cargo build --package krab_cli

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run API contract checks (stable CLI interface)
        run: cargo run --package krab_cli -- contract check --diagnostics

      - name: Run protocol contract checks (parity + resolver)
        run: cargo run --package krab_cli -- contract protocol-check --diagnostics

  protocol-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [single, multi]
        protocol: [rest, graphql, rpc]
    env:
      KRAB_PROTOCOL_EXPOSURE_MODE: ${{ matrix.mode }}
      KRAB_PROTOCOL_DEFAULT: ${{ matrix.protocol }}
      KRAB_PROTOCOL_ENABLED: ${{ matrix.mode == 'multi' && 'rest,graphql,rpc' || matrix.protocol }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run users service tests under protocol matrix
        run: cargo test -p service_users

  parity-release-gate:
    runs-on: ubuntu-latest
    needs: [contract-check, protocol-matrix]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run parity gate suite
        run: |
          cargo test -p service_users parity_
          cargo test -p krab_core --features rest protocol
